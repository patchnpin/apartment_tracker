name: Daily Apartment Scraper

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - run: python scraper.py

      - name: Show file contents after scraper
        run: |
          echo "=== data/ folder ==="
          ls -la data/
          echo "=== docs/ folder ==="
          ls -la docs/
          echo "=== price_history row count ==="
          wc -l data/price_history.csv
          echo "=== docs price_history row count ==="
          wc -l docs/price_history.csv

      - name: Commit updated CSVs
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git status
          git add data/ docs/
          git status
          git commit -m "Daily update $(date +%Y-%m-%d)" || echo "No changes today"
          git push